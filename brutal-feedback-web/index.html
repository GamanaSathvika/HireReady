<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Interview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f0f;
        --panel: #1a1a1a;
        --text: #f3f3f3;
        --muted: #9a9a9a;
        --amber: #ffb547;
        --blue: #6aa1ff;
        --red: #ff6b6b;
        --green: #44d17a;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
      }
      .topRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .countdown {
        color: var(--muted);
        font-family:
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          "Courier New",
          monospace;
        font-size: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 500;
      }
      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 16px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }
      .micStatus {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .pulse {
        animation: pulse 1.1s infinite ease-in-out;
      }
      .dot-idle {
        background: #8b8b8b;
      }
      .dot-recording {
        background: var(--red);
      }
      .dot-thinking {
        background: var(--blue);
      }
      .dot-speaking {
        background: var(--green);
      }
      @keyframes pulse {
        0% {
          opacity: 0.45;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
        100% {
          opacity: 0.45;
          transform: scale(0.9);
        }
      }
      .toggleBtn {
        width: 100%;
        height: 52px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 200ms ease;
      }
      .toggleBtn.idle {
        background: #2c2c2c;
      }
      .toggleBtn.recording {
        background: #b93838;
      }
      .error {
        color: #ffd0d5;
        background: rgba(255, 94, 108, 0.12);
        border: 1px solid rgba(255, 94, 108, 0.25);
        padding: 10px 12px;
        border-radius: 10px;
      }
      label {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .transcriptPanel {
        margin-top: 10px;
        max-height: 340px;
        overflow: auto;
        font-family:
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          "Courier New",
          monospace;
        font-size: 13px;
        line-height: 1.45;
      }
      .line {
        margin: 0 0 8px;
        white-space: pre-wrap;
      }
      .who-user {
        color: var(--amber);
      }
      .who-ai {
        color: var(--blue);
      }
      .feedbackPanel {
        opacity: 0;
        transform: translateY(8px);
        max-height: 0;
        overflow: hidden;
        transition:
          opacity 260ms ease,
          transform 260ms ease,
          max-height 260ms ease;
      }
      .feedbackPanel.show {
        opacity: 1;
        transform: translateY(0);
        max-height: 1800px;
      }
      .scoreBlock {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
        text-align: center;
        font-size: 30px;
        font-weight: 700;
      }
      .sectionBlock {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .sectionTitle {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
      }
      .sectionBody {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
        font-size: 12.5px;
      }
      .fixItem {
        border: 1px solid rgba(255, 107, 107, 0.5);
        background: rgba(255, 107, 107, 0.1);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .collapsible details {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
      }
      .newInterviewWrap {
        display: none;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field input,
      .field select {
        width: 100%;
        box-sizing: border-box;
        background: #121212;
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
      }
      .timeBanner {
        display: none;
        border: 1px solid rgba(255, 181, 71, 0.45);
        color: #ffd69c;
        background: rgba(255, 181, 71, 0.12);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
      }
      #captions {
        margin-top: 16px;
        padding: 16px;
        background: #1a1a1a;
        border-radius: 8px;
        min-height: 80px;
        max-height: 160px;
        overflow-y: auto;
        font-size: 0.95rem;
        line-height: 1.6;
        display: none;
      }
      .caption-interim {
        color: #666;
        font-style: italic;
      }
      .caption-final {
        color: #f0f0f0;
      }
      .interviewerStrip {
        display: flex;
        align-items: center;
        gap: 16px;
        padding-bottom: 16px;
        margin-bottom: 4px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .interviewerAvatarWrap {
        flex-shrink: 0;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, rgba(106, 161, 255, 0.18), rgba(26, 34, 53, 0.95));
        border: 2px solid rgba(106, 161, 255, 0.35);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        transition:
          transform 0.35s ease,
          box-shadow 0.35s ease,
          border-color 0.35s ease,
          opacity 0.35s ease;
      }
      .interviewerAvatarWrap .interviewerAvatarSvg {
        width: 76px;
        height: 76px;
        display: block;
        border-radius: 50%;
        transition: transform 0.3s ease;
      }
      .interviewerAvatarWrap.state-listening {
        opacity: 0.88;
        border-color: rgba(255, 107, 107, 0.45);
        box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.12);
      }
      .interviewerAvatarWrap.state-thinking {
        animation: avatarThinking 1.25s ease-in-out infinite;
        border-color: rgba(106, 161, 255, 0.55);
      }
      @keyframes avatarThinking {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 0 24px 6px rgba(106, 161, 255, 0.22);
        }
      }
      .interviewerAvatarWrap.state-speaking {
        animation: avatarSpeakingSoft 2.4s ease-in-out infinite;
        border-color: rgba(68, 209, 122, 0.55);
      }
      @keyframes avatarSpeakingSoft {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        }
        50% {
          transform: scale(1.02);
          box-shadow: 0 0 20px 6px rgba(68, 209, 122, 0.22);
        }
      }
      .interviewerAvatarWrap.state-speaking .interviewerAvatarSvg {
        animation: none;
      }
      #avatarMouthCluster {
        transition: transform 0.06s ease-out;
      }
      #avatarMouthCluster.mouth-open {
        transform: translate(50px, 55.6px);
      }
      #avatarMouthCluster:not(.mouth-open) {
        transform: translate(50px, 55px);
      }
      .interviewerBio {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .interviewerBioName {
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .interviewerBioTag {
        font-size: 13px;
        color: var(--muted);
      }
      .interviewerAvatarWrap.state-completed {
        border-color: rgba(68, 209, 122, 0.45);
        opacity: 1;
        animation: none;
      }
      .interviewerAvatarWrap.state-completed .interviewerAvatarSvg {
        animation: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topRow">
        <div>
          <h1>Mock Interview</h1>
          <div class="subtitle">Powered by AI — speak naturally</div>
        </div>
        <div class="countdown" id="countdown">10:00</div>
      </div>
      <div class="card" style="margin-top: 14px">
        <div class="interviewerStrip">
          <div class="interviewerAvatarWrap state-idle" id="interviewerAvatarWrap" aria-hidden="true">
            <svg class="interviewerAvatarSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="avFace" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color: #d4b896" />
                  <stop offset="100%" style="stop-color: #b89572" />
                </linearGradient>
                <linearGradient id="avHair" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color: #3d3428" />
                  <stop offset="100%" style="stop-color: #1e1914" />
                </linearGradient>
              </defs>
              <circle cx="50" cy="50" r="48" fill="#121a28" />
              <path d="M32 82 Q50 70 68 82 L68 100 H32 Z" fill="#2a3548" />
              <path d="M32 82 Q50 74 68 82" fill="none" stroke="#4a5a72" stroke-width="1" />
              <ellipse cx="50" cy="44" rx="24" ry="28" fill="url(#avFace)" />
              <path
                d="M26 42 Q26 20 50 18 Q74 20 74 42 Q74 32 50 28 Q26 32 26 42 Z"
                fill="url(#avHair)"
              />
              <ellipse cx="41" cy="42" rx="3.2" ry="2.2" fill="#1a1510" />
              <ellipse cx="59" cy="42" rx="3.2" ry="2.2" fill="#1a1510" />
              <ellipse cx="41.5" cy="41.2" rx="1" ry="0.7" fill="rgba(255,255,255,0.35)" />
              <ellipse cx="59.5" cy="41.2" rx="1" ry="0.7" fill="rgba(255,255,255,0.35)" />
              <g id="avatarMouthCluster" transform="translate(50, 55)">
                <path
                  id="avatarMouthClosed"
                  d="M -8 0 Q 0 3.6 8 0"
                  fill="none"
                  stroke="#6b5344"
                  stroke-width="1.85"
                  stroke-linecap="round"
                />
                <ellipse
                  id="avatarMouthOpen"
                  cx="0"
                  cy="1.8"
                  rx="5.8"
                  ry="4.2"
                  fill="#2a1814"
                  stroke="#5a4034"
                  stroke-width="0.45"
                  opacity="0"
                />
                <ellipse cx="-2" cy="0.5" rx="2" ry="1.1" fill="rgba(255,255,255,0.12)" opacity="0" id="avatarMouthTeeth" />
              </g>
            </svg>
          </div>
          <div class="interviewerBio">
            <span class="interviewerBioName">Jordan Lee</span>
            <span class="interviewerBioTag">AI interviewer · listening and responding like a real panel</span>
          </div>
        </div>
        <div class="row">
          <div class="status">
            <span id="statusDot" class="dot dot-idle pulse"></span>
            <span id="statusText">Ready</span>
          </div>
          <div class="micStatus">
            <span id="micDot" class="dot dot-idle"></span>
            <span id="micText">Checking microphone...</span>
          </div>
          <div id="timeBanner" class="timeBanner">Time limit reached — here is your feedback</div>
          <div id="errBox" class="error" style="display: none"></div>
          <div id="setupFields">
            <div class="field">
              <label for="roleInput">Role you are applying for</label>
              <select id="roleInput">
                <option value="">Select role</option>
              </select>
            </div>
            <div class="field" style="margin-top: 10px">
              <label for="experienceLevel">Experience level</label>
              <select id="experienceLevel">
                <option value="">Select experience level</option>
                <option>Fresher</option>
                <option>0-1 years</option>
                <option>1-3 years</option>
              </select>
            </div>
            <div class="field" style="margin-top: 10px">
              <label for="timerSelect">Session timer</label>
              <select id="timerSelect">
                <option value="300">5 min</option>
                <option value="600" selected>10 min</option>
                <option value="900">15 min</option>
                <option value="1200">20 min</option>
              </select>
            </div>
          </div>
          <div class="card">
            <label>Transcript</label>
            <div id="transcript" class="transcriptPanel"></div>
          </div>
          <div class="card feedbackPanel" id="feedbackPanel">
            <label>Feedback</label>
            <div id="feedback"></div>
          </div>
          <div class="newInterviewWrap" id="newInterviewWrap">
            <button class="toggleBtn idle" id="btnStartNewInterview">Start New Interview</button>
          </div>
          <button class="toggleBtn idle" id="btnToggle">Start Interview</button>
          <div id="captions"></div>
        </div>
      </div>
    </div>
    <script>
      const $ = (id) => document.getElementById(id);
      const errBox = $("errBox");
      const statusDot = $("statusDot");
      const statusText = $("statusText");
      const micDot = $("micDot");
      const micText = $("micText");
      const transcriptEl = $("transcript");
      const feedbackEl = $("feedback");
      const feedbackPanel = $("feedbackPanel");
      const setupFields = $("setupFields");
      const roleInput = $("roleInput");
      const ROLE_GROUPS = [
        {
          label: "Software & platform engineering",
          roles: [
            "Backend Developer",
            "DevOps Engineer",
            "Embedded Software Engineer",
            "Frontend Developer",
            "Full Stack Developer",
            "Mobile App Developer",
            "QA / Test Engineer",
            "Security Engineer",
            "Senior Software Engineer",
            "Site Reliability Engineer (SRE)",
            "Software Engineer",
            "Solutions Architect",
            "Technical Lead",
          ],
        },
        {
          label: "Data, AI & analytics",
          roles: [
            "BI Developer",
            "Data Analyst",
            "Data Engineer",
            "Data Scientist",
            "Machine Learning Engineer",
          ],
        },
        {
          label: "Product, project & delivery",
          roles: [
            "Business Analyst",
            "Product Manager",
            "Product Owner",
            "Program Manager",
            "Project Manager",
            "Scrum Master",
          ],
        },
        {
          label: "Design & technical content",
          roles: ["Technical Writer", "UI Designer", "UX Designer", "UX Researcher"],
        },
        {
          label: "IT & infrastructure",
          roles: ["Cloud Engineer", "IT Support Specialist", "Network Engineer", "Systems Administrator"],
        },
        {
          label: "Sales, marketing & customer success",
          roles: [
            "Account Executive",
            "Account Manager",
            "Business Development Representative",
            "Customer Success Manager",
            "Digital Marketing Specialist",
            "Marketing Manager",
            "Sales Representative",
          ],
        },
        {
          label: "Finance & accounting",
          roles: ["Accountant", "Auditor", "Financial Analyst"],
        },
        {
          label: "HR & recruiting",
          roles: ["HR Generalist", "Recruiter / Talent Acquisition Specialist"],
        },
        {
          label: "Healthcare & clinical support",
          roles: ["Clinical Research Associate", "Medical Assistant", "Registered Nurse (RN)"],
        },
        {
          label: "Engineering (non-software) & operations",
          roles: [
            "Civil Engineer",
            "Electrical Engineer",
            "Management Trainee",
            "Mechanical Engineer",
            "Operations Manager",
            "Supply Chain Analyst",
          ],
        },
        {
          label: "Legal & education",
          roles: ["Attorney / Lawyer", "Paralegal", "Teacher / Educator"],
        },
      ];
      (function fillRoleSelect() {
        if (!roleInput) return;
        for (const g of ROLE_GROUPS) {
          const og = document.createElement("optgroup");
          og.label = g.label;
          for (const title of g.roles) {
            const opt = document.createElement("option");
            opt.value = title;
            opt.textContent = title;
            og.appendChild(opt);
          }
          roleInput.appendChild(og);
        }
      })();
      const experienceLevelEl = $("experienceLevel");
      const timerSelect = $("timerSelect");
      const countdownEl = $("countdown");
      const timeBanner = $("timeBanner");
      const btnToggle = $("btnToggle");
      const newInterviewWrap = $("newInterviewWrap");
      const btnStartNewInterview = $("btnStartNewInterview");
      const captionsEl = $("captions");

      let stream = null;
      let recorder = null;
      let chunks = [];
      let blob = null;
      let history = [];
      let loopActive = false;
      let audioCtx = null;
      let analyser = null;
      let sourceNode = null;
      let silenceRaf = 0;
      let recordStartedAt = 0;
      let belowSince = 0;
      let micChecked = false;
      let micBlocked = false;
      let selectedRole = "";
      let experienceLevel = "";
      let totalDurationSec = 600;
      let remainingSec = 600;
      let timerId = 0;
      let timerExpiredTriggered = false;
      let liveRecognition = null;
      let captionsStopping = false;
      let finalTranscript = "";
      let avatarMouthCloseTimer = 0;
      let avatarTalkFallbackTimer = 0;
      let avatarLastWordAt = 0;

      function setAvatarMouthVisual(open) {
        const cluster = $("avatarMouthCluster");
        const closedP = $("avatarMouthClosed");
        const openE = $("avatarMouthOpen");
        const teeth = $("avatarMouthTeeth");
        if (!cluster || !closedP || !openE) return;
        cluster.classList.toggle("mouth-open", Boolean(open));
        closedP.setAttribute("opacity", open ? "0" : "1");
        openE.setAttribute("opacity", open ? "1" : "0");
        if (teeth) teeth.setAttribute("opacity", open ? "0.72" : "0");
      }
      function scheduleAvatarMouthClose(ms) {
        if (avatarMouthCloseTimer) clearTimeout(avatarMouthCloseTimer);
        avatarMouthCloseTimer = window.setTimeout(() => {
          avatarMouthCloseTimer = 0;
          setAvatarMouthVisual(false);
        }, ms);
      }
      function pulseAvatarMouth() {
        setAvatarMouthVisual(true);
        scheduleAvatarMouthClose(36 + Math.random() * 52);
      }
      function stopAvatarMouthSync() {
        if (avatarMouthCloseTimer) {
          clearTimeout(avatarMouthCloseTimer);
          avatarMouthCloseTimer = 0;
        }
        if (avatarTalkFallbackTimer) {
          clearInterval(avatarTalkFallbackTimer);
          avatarTalkFallbackTimer = 0;
        }
        setAvatarMouthVisual(false);
      }
      const API_BASE = "http://localhost:3001";
      /** Extra pause after your answer is processed, before the interviewer speaks (ms). */
      const AI_REPLY_DELAY_MS = 2400;
      /** How long the mic must stay quiet after speech before auto-stopping (end-of-answer). */
      const SILENCE_AUTO_STOP_MS = 5000;
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
      const FEEDBACK_HEADINGS = [
        "Overall Score (out of 10)",
        "Communication",
        "Structure",
        "Technical Depth",
        "Confidence",
        "Question-by-Question Breakdown",
        "Top 3 Things to Fix",
      ];

      function setStatus(state) {
        const map = {
          idle: { label: "Ready", dot: "dot-idle pulse" },
          listening: { label: "Listening...", dot: "dot-recording pulse" },
          thinking: { label: "Thinking...", dot: "dot-thinking pulse" },
          speaking: { label: "Speaking...", dot: "dot-speaking" },
          completed: { label: "Completed", dot: "dot-speaking" },
        };
        const current = map[state] || map.idle;
        statusText.textContent = current.label;
        statusDot.className = `dot ${current.dot}`;
        const av = $("interviewerAvatarWrap");
        if (av) {
          const key = map[state] ? state : "idle";
          av.className = `interviewerAvatarWrap state-${key}`;
        }
      }
      function setMicStatus(kind, text) {
        micText.textContent = text;
        micDot.className = "dot";
        if (kind === "ready") micDot.classList.add("dot-speaking");
        if (kind === "blocked") micDot.classList.add("dot-recording");
        if (kind === "checking") micDot.classList.add("dot-idle");
      }
      function formatMMSS(total) {
        const m = Math.floor(total / 60);
        const s = total % 60;
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }
      function updateCountdown() {
        countdownEl.textContent = formatMMSS(Math.max(0, remainingSec));
      }
      function startCountdown() {
        stopCountdown();
        timerId = window.setInterval(() => {
          if (!loopActive) return;
          remainingSec -= 1;
          updateCountdown();
          if (remainingSec <= 0) {
            handleTimerExpired();
          }
        }, 1000);
      }
      function stopCountdown() {
        if (timerId) window.clearInterval(timerId);
        timerId = 0;
      }
      function syncStartButtonState() {
        selectedRole = roleInput.value.trim();
        experienceLevel = experienceLevelEl.value.trim();
        totalDurationSec = Number(timerSelect.value || 600);
        if (!loopActive) {
          const canStart = micChecked && !micBlocked && selectedRole && experienceLevel;
          btnToggle.disabled = !canStart;
          btnToggle.title = micBlocked
            ? "Microphone blocked. Enable microphone in browser settings."
            : !selectedRole || !experienceLevel
              ? "Select a role and experience level to start."
              : "";
        }
      }

      function showError(msg) {
        errBox.style.display = "block";
        errBox.textContent = msg;
      }
      function clearError() {
        errBox.style.display = "none";
        errBox.textContent = "";
      }
      function escapeHtml(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderTranscript(messages, latestTranscript) {
        const rows = [];
        if (Array.isArray(messages)) {
          for (const m of messages) {
            if (m?.role === "user") rows.push(`<p class="line"><span class="who-user">You:</span> ${escapeHtml(m.content || "")}</p>`);
            if (m?.role === "assistant") rows.push(`<p class="line"><span class="who-ai">Interviewer:</span> ${escapeHtml(m.content || "")}</p>`);
          }
        }
        if (!rows.length && latestTranscript) rows.push(`<p class="line"><span class="who-user">You:</span> ${escapeHtml(latestTranscript)}</p>`);
        transcriptEl.innerHTML = rows.join("") || `<p class="line">No transcript yet.</p>`;
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function parseFeedbackSections(message) {
        const text = String(message || "").trim();
        if (!text) return [];
        const lines = text.split(/\r?\n/);
        const sections = [];
        let current = null;
        const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
        const lookup = new Map(FEEDBACK_HEADINGS.map((h) => [normalize(h), h]));
        for (const line of lines) {
          const raw = line.trim();
          const headingCandidate = raw.replace(/^[-*]\s*/, "").replace(/:$/, "");
          const heading = lookup.get(normalize(headingCandidate));
          if (heading) {
            if (current) sections.push(current);
            current = { heading, body: [] };
            continue;
          }
          if (!current) current = { heading: "Feedback", body: [] };
          current.body.push(line);
        }
        if (current) sections.push(current);
        return sections.map((s) => ({ heading: s.heading, body: s.body.join("\n").trim() })).filter((s) => s.heading || s.body);
      }

      function renderFeedbackReport(message) {
        const sections = parseFeedbackSections(message);
        if (!sections.length) {
          feedbackEl.innerHTML = `<pre class="sectionBody">${escapeHtml(message || "")}</pre>`;
          return;
        }
        const parseScore = (value) => {
          const match = String(value || "").match(/(\d+(\.\d+)?)/);
          return match ? Number(match[1]) : null;
        };
        const html = [];
        for (const section of sections) {
          const title = escapeHtml(section.heading || "Feedback");
          const body = escapeHtml(section.body || "(none)");
          const normalized = (section.heading || "").toLowerCase();
          if (normalized.includes("overall score")) {
            const score = parseScore(section.body);
            let color = "#44d17a";
            if (score !== null && score < 4) color = "#ff6b6b";
            if (score !== null && score >= 4 && score < 7) color = "#ffb547";
            html.push(`<div class="scoreBlock" style="color:${color}"><div class="sectionTitle">${title}</div><div>${body}</div></div>`);
            continue;
          }
          if (normalized.includes("top 3 things to fix")) {
            const points = section.body.split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
            const items = points.map((p) => `<div class="fixItem">⚠ ${escapeHtml(p.replace(/^[-*\d.)\s]+/, ""))}</div>`).join("");
            html.push(`<div class="sectionBlock"><p class="sectionTitle">${title}</p>${items || `<pre class="sectionBody">${body}</pre>`}</div>`);
            continue;
          }
          if (normalized.includes("question-by-question breakdown")) {
            const points = section.body.split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
            const details = points
              .map((p, i) => `<details><summary>Question ${i + 1}</summary><pre class="sectionBody">${escapeHtml(p.replace(/^[-*\d.)\s]+/, ""))}</pre></details>`)
              .join("");
            html.push(`<div class="sectionBlock"><p class="sectionTitle">${title}</p><div class="collapsible">${details || `<pre class="sectionBody">${body}</pre>`}</div></div>`);
            continue;
          }
          html.push(`<div class="sectionBlock"><p class="sectionTitle">${title}</p><pre class="sectionBody">${body}</pre></div>`);
        }
        feedbackEl.innerHTML = html.join("");
      }

      function pickMimeType() {
        const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4"];
        for (const c of candidates) if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
        return "";
      }
      function stopLiveCaptions() {
        captionsStopping = true;
        if (liveRecognition) {
          try {
            liveRecognition.stop();
          } catch {}
          liveRecognition = null;
        }
        if (captionsEl) {
          captionsEl.style.display = "none";
          captionsEl.innerHTML = "";
        }
        finalTranscript = "";
      }
      function startLiveCaptions() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition || !captionsEl) return;
        finalTranscript = "";
        captionsEl.innerHTML = "";
        captionsEl.style.display = "block";
        captionsStopping = false;
        const recognition = new SpeechRecognition();
        liveRecognition = recognition;
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-US";
        recognition.onresult = (event) => {
          if (!captionsEl || captionsStopping) return;
          let interimTranscript = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const text = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += text + " ";
            } else {
              interimTranscript += text;
            }
          }
          captionsEl.innerHTML =
            `<span class="caption-final">${escapeHtml(finalTranscript)}</span>` +
            `<span class="caption-interim">${escapeHtml(interimTranscript)}</span>`;
          captionsEl.scrollTop = captionsEl.scrollHeight;
        };
        recognition.onerror = () => {};
        recognition.onend = () => {
          if (captionsStopping) {
            return;
          }
          if (loopActive && recorder && recorder.state === "recording" && liveRecognition === recognition) {
            try {
              recognition.start();
            } catch {}
          }
        };
        const kickoff = () => {
          if (liveRecognition !== recognition || captionsStopping) return;
          try {
            recognition.start();
          } catch {
            liveRecognition = null;
            captionsEl.style.display = "none";
          }
        };
        queueMicrotask(kickoff);
      }
      function stopAllTracks() {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
      }
      function stopSilenceMonitor() {
        if (silenceRaf) cancelAnimationFrame(silenceRaf);
        silenceRaf = 0;
        belowSince = 0;
      }
      function ensureAnalyser() {
        if (!stream) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
        if (sourceNode) {
          try {
            sourceNode.disconnect();
          } catch {}
        }
        if (!analyser) {
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          analyser.smoothingTimeConstant = 0.3;
        }
        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(analyser);
      }
      function startSilenceMonitor() {
        stopSilenceMonitor();
        if (!analyser) return;
        const data = new Uint8Array(analyser.fftSize);
        const baseThreshold = 0.01;
        const requiredMs = SILENCE_AUTO_STOP_MS;
        const minRecordMs = 800;
        const maxRecordMs = 60000;
        let minRms = Infinity;
        let hadSpeech = false;
        let rmsEma = null;
        const emaAlpha = 0.2;
        const tick = () => {
          if (!loopActive) return;
          silenceRaf = requestAnimationFrame(tick);
          if (!recorder || recorder.state !== "recording") return;
          analyser.getByteTimeDomainData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) {
            const v = (data[i] - 128) / 128;
            sum += v * v;
          }
          const rms = Math.sqrt(sum / data.length);
          const now = performance.now();
          rmsEma = rmsEma === null ? rms : emaAlpha * rms + (1 - emaAlpha) * rmsEma;
          if (!hadSpeech && rmsEma > 0 && rmsEma < minRms) minRms = rmsEma;
          const adaptive = Number.isFinite(minRms) ? minRms * 1.6 : baseThreshold;
          const threshold = Math.max(baseThreshold, adaptive);
          if (rmsEma < threshold) {
            if (hadSpeech && !belowSince) belowSince = now;
          } else {
            hadSpeech = true;
            belowSince = 0;
          }
          const elapsed = now - recordStartedAt;
          if (elapsed >= maxRecordMs) {
            try {
              recorder.stop();
            } catch {}
            return;
          }
          if (belowSince && hadSpeech && elapsed >= minRecordMs && now - belowSince >= requiredMs) {
            try {
              recorder.stop();
            } catch {}
          }
        };
        silenceRaf = requestAnimationFrame(tick);
      }
      function speak(text) {
        return new Promise((resolve, reject) => {
          clearError();
          if (!("speechSynthesis" in window)) {
            reject(new Error("This browser does not support speechSynthesis."));
            return;
          }
          if (!text || !text.trim()) {
            resolve();
            return;
          }
          console.log("TTS input:", text);
          stopAvatarMouthSync();
          setStatus("speaking");
          window.speechSynthesis.cancel();
          const utter = new SpeechSynthesisUtterance(text);
          utter.rate = 0.98;
          utter.pitch = 1.02;
          const cleanup = () => {
            stopAvatarMouthSync();
          };
          utter.onstart = () => {
            avatarLastWordAt = performance.now();
            pulseAvatarMouth();
            avatarTalkFallbackTimer = window.setInterval(() => {
              const gap = performance.now() - avatarLastWordAt;
              if (gap > 140 && Math.random() < 0.42) {
                pulseAvatarMouth();
                avatarLastWordAt = performance.now() - 60;
              }
            }, 88);
          };
          utter.onboundary = (e) => {
            avatarLastWordAt = performance.now();
            const n = String(e?.name || "").toLowerCase();
            if (n === "word" || n === "sentence") {
              pulseAvatarMouth();
            }
          };
          utter.onend = () => {
            cleanup();
            resolve();
          };
          utter.onerror = (e) => {
            cleanup();
            reject(e?.error || new Error("TTS failed."));
          };
          window.speechSynthesis.speak(utter);
        });
      }
      async function postInterview(audioBlob) {
        const url = `${API_BASE}/interview`;
        const fd = new FormData();
        if (audioBlob) {
          const ext = audioBlob.type.includes("mp4") ? "mp4" : "webm";
          fd.append("audio", audioBlob, `recording.${ext}`);
        }
        fd.append("history", JSON.stringify(history));
        fd.append("message", "");
        fd.append("role", selectedRole);
        fd.append("experienceLevel", experienceLevel);
        fd.append("timerExpired", "false");
        setStatus("thinking");
        const res = await fetch(url, { method: "POST", body: fd });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`Non-JSON response: ${text.slice(0, 200)}`);
        }
        console.log("API raw response:", data);
        if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
        return data;
      }
      function buildInterviewOpeningLine() {
        syncStartButtonState();
        const role = selectedRole.trim() || "this position";
        const level = experienceLevel.trim();
        const levelClause = level ? ` This session is calibrated for ${level} experience.` : "";
        return `Hello — I'm your interviewer for the ${role} role.${levelClause} When you're ready, introduce yourself and what draws you to this kind of work.`;
      }
      async function greetAndStart() {
        loopActive = true;
        timerExpiredTriggered = false;
        feedbackPanel.classList.remove("show");
        feedbackEl.innerHTML = "";
        await speak(buildInterviewOpeningLine());
        if (!loopActive) return;
        await startRecordingLoop();
      }
      async function ensureMic() {
        if (stream) return;
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
      async function resetInterviewState() {
        loopActive = false;
        stopCountdown();
        stopSilenceMonitor();
        stopLiveCaptions();
        stopAvatarMouthSync();
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        if (recorder && recorder.state !== "inactive") {
          try {
            recorder.stop();
          } catch {}
        }
        history = [];
        renderTranscript([], "");
        feedbackEl.innerHTML = "";
        feedbackPanel.classList.remove("show");
        setStatus("idle");
        remainingSec = totalDurationSec;
        updateCountdown();
        setupFields.style.display = "block";
        timeBanner.style.display = "none";
        countdownEl.textContent = formatMMSS(remainingSec);
        newInterviewWrap.style.display = "none";
        btnToggle.style.display = "inline-block";
        btnToggle.classList.add("idle");
        btnToggle.classList.remove("recording");
        btnToggle.textContent = "Start Interview";
        syncStartButtonState();
      }
      async function sendTimerExpiredAndFinalize() {
        const url = `${API_BASE}/interview`;
        const fd = new FormData();
        fd.append("history", JSON.stringify(history));
        fd.append("message", "[TIMER EXPIRED] The interview time limit has been reached. Generate the complete feedback report now.");
        fd.append("role", selectedRole);
        fd.append("experienceLevel", experienceLevel);
        fd.append("timerExpired", "true");
        setStatus("thinking");
        const res = await fetch(url, { method: "POST", body: fd });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`Non-JSON response: ${text.slice(0, 200)}`);
        }
        if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
        return data;
      }
      async function handleTimerExpired() {
        if (timerExpiredTriggered) return;
        timerExpiredTriggered = true;
        remainingSec = 0;
        updateCountdown();
        stopCountdown();
        loopActive = false;
        stopSilenceMonitor();
        stopLiveCaptions();
        stopAvatarMouthSync();
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        if (recorder && recorder.state !== "inactive") {
          try {
            recorder.stop();
          } catch {}
        }
        try {
          const data = await sendTimerExpiredAndFinalize();
          history = Array.isArray(data.history) ? data.history : history;
          renderTranscript(history, data.transcript || "");
          renderFeedbackReport(data.message || data.reply || "");
          feedbackPanel.classList.add("show");
          timeBanner.style.display = "block";
          setStatus("completed");
          btnToggle.style.display = "none";
          newInterviewWrap.style.display = "block";
        } catch (e) {
          showError(e?.message || "Timer finalize failed.");
          setStatus("idle");
        }
      }
      async function startRecordingLoop() {
        clearError();
        if (!stream) return;
        const mimeType = pickMimeType();
        if (!mimeType) {
          showError("No supported MediaRecorder audio mimeType found in this browser.");
          return;
        }
        chunks = [];
        blob = null;
        try {
          recorder = new MediaRecorder(stream, { mimeType });
        } catch (e) {
          showError(e?.message || "Failed to start recorder.");
          return;
        }
        recorder.ondataavailable = (ev) => {
          if (ev.data && ev.data.size > 0) chunks.push(ev.data);
        };
        recorder.onstop = async () => {
          stopLiveCaptions();
          stopSilenceMonitor();
          blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          if (!loopActive) return;
          try {
            const data = await postInterview(blob);
            const message = data.message || data.reply || "";
            history = Array.isArray(data.history) ? data.history : [];
            renderTranscript(history, data.transcript || "");
            console.log("Transcribed:", data.transcript || "");
            if (data.interviewDone) {
              loopActive = false;
              stopCountdown();
              stopSilenceMonitor();
              stopAvatarMouthSync();
              if ("speechSynthesis" in window) window.speechSynthesis.cancel();
              renderFeedbackReport(message);
              feedbackPanel.classList.add("show");
              setStatus("completed");
              btnToggle.style.display = "none";
              newInterviewWrap.style.display = "block";
              return;
            }
            if (data.done) {
              loopActive = false;
              stopCountdown();
              setStatus("idle");
              btnToggle.textContent = "Start Interview";
              return;
            }
            if (data.transcript && String(data.transcript).trim()) {
              await sleep(AI_REPLY_DELAY_MS);
              if (!loopActive) return;
              await speak(message);
            }
            if (!loopActive) return;
            await startRecordingLoop();
          } catch (e) {
            showError(e?.message || "Request failed.");
            setStatus("idle");
          }
        };
        recordStartedAt = performance.now();
        ensureAnalyser();
        recorder.start();
        setStatus("listening");
        startLiveCaptions();
        startSilenceMonitor();
      }
      btnToggle.onclick = async () => {
        clearError();
        if (loopActive) {
          await resetInterviewState();
          return;
        }
        try {
          history = [];
          renderTranscript([], "");
          feedbackEl.innerHTML = "";
          feedbackPanel.classList.remove("show");
          setupFields.style.display = "none";
          newInterviewWrap.style.display = "none";
          btnToggle.style.display = "inline-block";
          btnToggle.textContent = "Stop Interview";
          btnToggle.classList.remove("idle");
          btnToggle.classList.add("recording");
          remainingSec = totalDurationSec;
          updateCountdown();
          startCountdown();
          await greetAndStart();
        } catch (e) {
          stopCountdown();
          btnToggle.textContent = "Start Interview";
          btnToggle.classList.remove("recording");
          btnToggle.classList.add("idle");
          showError(e?.message || "Could not start interview.");
        }
      };
      btnStartNewInterview.onclick = async () => {
        await resetInterviewState();
      };
      roleInput.addEventListener("change", syncStartButtonState);
      experienceLevelEl.addEventListener("change", syncStartButtonState);
      timerSelect.addEventListener("change", () => {
        totalDurationSec = Number(timerSelect.value || 600);
        remainingSec = totalDurationSec;
        updateCountdown();
        syncStartButtonState();
      });
      (async () => {
        setMicStatus("checking", "Checking microphone...");
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          micChecked = true;
          micBlocked = false;
          setMicStatus("ready", "Mic ready");
        } catch {
          micChecked = true;
          micBlocked = true;
          setMicStatus("blocked", "Mic blocked — check browser settings");
        } finally {
          syncStartButtonState();
        }
      })();
      window.addEventListener("beforeunload", () => {
        stopLiveCaptions();
        stopAvatarMouthSync();
        stopAllTracks();
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      });
      renderTranscript([], "");
      setStatus("idle");
      syncStartButtonState();
      updateCountdown();
    </script>
  </body>
</html>
